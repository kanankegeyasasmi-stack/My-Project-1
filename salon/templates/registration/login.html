{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login - Valencia Salon</title>
    <link rel="stylesheet" href="{% static 'salon/css/style.css' %}">
</head>
<body>

    <section class="contact" style="min-height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div class="contact-form-box" style="max-width: 450px; width: 100%;">
            <h3 style="text-align: center;">Login</h3>
            <p style="text-align: center; margin-bottom: 20px; color: #666;">
                Please log in to continue to your booking page.
            </p>

            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn" style="width: 100%;">Login</button>
            </form>

            <p style="text-align: center; margin-top: 20px; color: #666;">
                Don’t have an account?
                <a href="/signup/" style="color: #c86b85; text-decoration: none; font-weight: bold;">
                    Create one here
                </a>
            </p>
        </div>
    </section>

</body>
</html>
